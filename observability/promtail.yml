server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape logs from Docker containers
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only containers with specific names (campaigns_api only, not infrastructure)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(campaigns_api)'
        action: keep
      # Set job label from container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: 'job'
      # Add container_name label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: 'container'
      # Add service label for service discovery (optional, may not exist)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
        regex: '(.+)'
      # Add environment label with default value
      - target_label: 'environment'
        replacement: 'local'
    pipeline_stages:
      # Parse Elixir/Phoenix log format with timestamp
      - multiline:
          firstline: '^\d{2}:\d{2}:\d{2}\.\d{3}|\[\w+\]'
          max_wait_time: 3s
      # Extract log level (optional, won't fail if not found)
      - regex:
          expression: '\[(?P<level>\w+)\]'
      - labels:
          level:
