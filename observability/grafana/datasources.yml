apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    editable: true
    jsonData:
      httpMethod: GET
      tracesToLogs:
        datasourceUid: loki
        tags: ['job', 'container', 'service']
        mappedTags: [{ key: 'service.name', value: 'service' }]
        mapTagNamesEnabled: true
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: true
        filterBySpanID: true
        # Custom query to find logs by trace_id
        customQuery: true
        query: '{job="campaigns_api"} |= "trace_id=$${__trace.traceId}"'
      tracesToMetrics:
        datasourceUid: prometheus
        tags: [{ key: 'service.name', value: 'service' }]
        queries:
          - name: 'Sample query'
            query: 'sum(rate(tempo_spanmetrics_latency_bucket{$__tags}[5m]))'
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        # Link trace_id to Tempo for direct navigation from logs to traces
        - datasourceUid: tempo
          matcherRegex: "trace_id=([a-f0-9]{32})"
          name: TraceID
          url: '$${__value.raw}'
          urlDisplayLabel: 'View Trace'
        # Display span_id as a derived field
        - datasourceUid: tempo
          matcherRegex: "span_id=([a-f0-9]{16})"
          name: SpanID
          url: '$${__value.raw}'
          urlDisplayLabel: 'View Span'
